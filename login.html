<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenTrack — Sign In</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* ── Left panel ── */
    .login-left {
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }

    .login-left::before {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #6db87a0a 0%, transparent 70%);
      pointer-events: none;
    }

    .back-link {
      position: absolute;
      top: 32px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--cream-dim);
      transition: var(--transition);
    }
    .back-link:hover { color: var(--cream); }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-serif);
      font-size: 1.4rem;
      color: var(--white);
      margin-bottom: 48px;
    }

    .login-title {
      font-family: var(--font-serif);
      font-size: 2.5rem;
      line-height: 1.1;
      color: var(--white);
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeUp 0.5s 0.1s ease forwards;
    }

    .login-sub {
      font-size: 0.9rem;
      color: var(--cream-dim);
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.5s 0.2s ease forwards;
    }

    .form-box {
      opacity: 0;
      animation: fadeUp 0.5s 0.3s ease forwards;
    }

    .form-tabs {
      display: flex;
      gap: 0;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 32px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--cream-dim);
      font-family: var(--font-sans);
      font-size: 0.88rem;
      cursor: pointer;
      border-radius: 7px;
      transition: var(--transition);
    }

    .tab-btn.active {
      background: var(--bg2);
      color: var(--white);
      border: 1px solid var(--border);
    }

    .form-fields {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 24px;
    }

    .form-error {
      background: #c9707011;
      border: 1px solid #c9707033;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: var(--red);
      display: none;
      animation: fadeUp 0.3s ease;
    }
    .form-error.show { display: block; }

    .form-footer {
      margin-top: 16px;
      font-size: 0.8rem;
      color: var(--cream-dim);
      text-align: center;
    }

    /* ── Right panel ── */
    .login-right {
      background: var(--bg2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }

    /* Animated grid background */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.5;
    }

    .grid-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, var(--bg2) 80%);
    }

    /* Preview card */
    .preview-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 340px;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .preview-title {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      color: var(--white);
    }

    .preview-date {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--cream-dim);
    }

    .preview-big {
      font-family: var(--font-serif);
      font-size: 3.5rem;
      color: var(--white);
      line-height: 1;
      margin-bottom: 6px;
    }

    .preview-big .unit {
      font-size: 1.2rem;
      color: var(--green);
    }

    .preview-sub {
      font-size: 0.82rem;
      color: var(--cream-dim);
      margin-bottom: 24px;
    }

    .preview-bar {
      height: 6px;
      background: var(--bg3);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .preview-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green-dim), var(--green));
      border-radius: 99px;
      width: 0;
      animation: fillBar 1.5s 0.8s ease forwards;
    }

    @keyframes fillBar {
      to { width: 62%; }
    }

    .preview-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--cream-dim);
      font-family: var(--font-mono);
      margin-bottom: 24px;
    }

    .preview-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .preview-row:last-child { border-bottom: none; }

    .preview-row-label {
      font-size: 0.82rem;
      color: var(--cream-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .preview-row-val {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--white);
    }

    .dot-indicator {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .login-right { display: none; }
      .login-left { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <!-- ── Left ── -->
  <div class="login-left">
    <a href="landing.html" class="back-link">← Back</a>

    <div class="login-brand">
      <span class="dot"></span>
      GreenTrack
    </div>

    <h1 class="login-title">Welcome back.</h1>
    <p class="login-sub">Track your daily carbon footprint in seconds.</p>

    <div class="form-box">
      <div class="form-tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
      </div>

      <!-- Login form -->
      <div id="loginForm">
        <div class="form-fields">
          <div class="input-group">
            <label>Username</label>
            <input type="text" id="loginUser" placeholder="e.g. eco_warrior" autocomplete="username" />
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
          </div>
        </div>
        <div class="form-error" id="loginError"></div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:20px;" onclick="handleLogin()">
          Sign In →
        </button>
      </div>

      <!-- Register form -->
      <div id="registerForm" style="display:none;">
        <div class="form-fields">
          <div class="input-group">
            <label>Username</label>
            <input type="text" id="regUser" placeholder="Choose a username" autocomplete="username" />
          </div>
          <div class="input-group">
            <label>Display Name</label>
            <input type="text" id="regName" placeholder="How should we call you?" />
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="regPass" placeholder="Min. 4 characters" autocomplete="new-password" />
          </div>
        </div>
        <div class="form-error" id="regError"></div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:20px;" onclick="handleRegister()">
          Create Account →
        </button>
      </div>

      <div class="form-footer">
        All data is stored locally in your browser.<br>No server. No tracking.
      </div>
    </div>
  </div>

  <!-- ── Right preview ── -->
  <div class="login-right">
    <div class="grid-bg"></div>
    <div class="preview-card card">
      <div class="preview-header">
        <div class="preview-title">Today's Emissions</div>
        <div class="preview-date" id="previewDate">—</div>
      </div>

      <div class="preview-big">5.2<span class="unit"> kg</span></div>
      <div class="preview-sub">CO₂ equivalent today</div>

      <div class="preview-bar">
        <div class="preview-bar-fill"></div>
      </div>
      <div class="preview-bar-label">
        <span>0 kg</span>
        <span>62% of daily goal (8.4 kg)</span>
        <span>8.4 kg</span>
      </div>

      <div class="preview-row">
        <span class="preview-row-label">
          <span class="dot-indicator" style="background:var(--green)"></span>
          Travel
        </span>
        <span class="preview-row-val">1.44 kg</span>
      </div>
      <div class="preview-row">
        <span class="preview-row-label">
          <span class="dot-indicator" style="background:var(--yellow)"></span>
          Electricity
        </span>
        <span class="preview-row-val">1.64 kg</span>
      </div>
      <div class="preview-row">
        <span class="preview-row-label">
          <span class="dot-indicator" style="background:var(--red)"></span>
          Food
        </span>
        <span class="preview-row-val">2.50 kg</span>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('previewDate').textContent =
      new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const isLogin = document.getElementById('loginForm').style.display !== 'none';
        isLogin ? handleLogin() : handleRegister();
      }
    });
  </script>
</body>
</html>
